name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (catastrophic errors only; full lint cleanup deferred to v0.2)
        run: ruff check --select=E9,F63,F7,F82 src/ tests/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  validate-data:
    name: Validate annotations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON annotations
        run: |
          python -c "
          import json, sys
          for path in ['data/annotations/functional_sites.json',
                       'data/annotations/physical_realizability.json']:
              with open(path) as f:
                  data = json.load(f)
              print(f'OK: {path} ({len(data)} entries)')
          "

  validate-release-surface:
    name: Validate release surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure generated design artifacts are not tracked
        run: |
          forbidden="$(git ls-files \
            'results/proteinmpnn_output/**' \
            'results/proteinmpnn_temp_sweep/**' \
            'results/esmfold_structures/**' \
            '*.npy' \
            '*.pt' \
            '*.bin' \
            '*.safetensors' \
            'models/**')"
          if [ -n "$forbidden" ]; then
            echo "Generated or heavyweight artifacts are tracked:"
            echo "$forbidden"
            exit 1
          fi

      - name: Ensure Hugging Face card uses corrected BoNT-A accession
        run: |
          grep -q 'P0DPI1 | Botulinum neurotoxin A light chain' huggingface/README.md
          if grep -q 'P10844 | Botulinum neurotoxin A light chain' huggingface/README.md; then
            echo "Stale BoNT-A accession found in Hugging Face card."
            exit 1
          fi
